{% extends 'base.html' %}
{% block title %}Proefsessie Bewerken | Coffee Bean Collector{% endblock %}

{% block content %}
<div class="container">
    <h2>Proefsessie Bewerken: {{ tasting.bean.name }}</h2>
    <form method="POST">
        {% csrf_token %}
        <table style="margin-bottom: 15px;">
            {{ form.as_table }}
        </table>
        <button type="submit" class="btn">Wijzigingen Opslaan</button>
        <a href="{% url 'tasting_list' %}" class="btn btn-secondary">Annuleren</a>
    </form>
</div>
{% endblock %}
